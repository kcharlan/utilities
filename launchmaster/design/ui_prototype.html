<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>launchmaster — launchd Control Center</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  :root {
    /* CRT-inspired dark palette */
    --bg-void: #06070b;
    --bg-base: #0a0b10;
    --bg-surface: #101118;
    --bg-elevated: #16171f;
    --bg-hover: #1c1d27;
    --bg-active: #22232f;

    --border-subtle: #1e1f2a;
    --border-default: #282938;
    --border-strong: #3a3b4a;

    --text-primary: #d8d9e4;
    --text-secondary: #8a8b9a;
    --text-tertiary: #5a5b6a;
    --text-inverse: #0a0b10;

    /* Status palette — high saturation, CRT glow */
    --status-running: #00e676;
    --status-running-bg: rgba(0,230,118,0.08);
    --status-running-border: rgba(0,230,118,0.25);

    --status-idle: #448aff;
    --status-idle-bg: rgba(68,138,255,0.08);
    --status-idle-border: rgba(68,138,255,0.25);

    --status-failed: #ff1744;
    --status-failed-bg: rgba(255,23,68,0.06);
    --status-failed-border: rgba(255,23,68,0.30);
    --status-failed-glow: rgba(255,23,68,0.15);

    --status-disabled: #616171;
    --status-disabled-bg: rgba(97,97,113,0.08);
    --status-disabled-border: rgba(97,97,113,0.20);

    --status-unloaded: #3a3b4a;
    --status-unloaded-bg: rgba(58,59,74,0.08);

    /* Accent */
    --accent: #ffab00;
    --accent-hover: #ffc107;
    --accent-bg: rgba(255,171,0,0.08);
    --accent-border: rgba(255,171,0,0.30);

    /* Danger */
    --danger: #ff1744;
    --danger-hover: #ff5252;
    --danger-bg: rgba(255,23,68,0.10);

    /* Fonts */
    --font-display: 'Chakra Petch', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    /* Scanline effect */
    --scanline-opacity: 0.03;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-void);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* Subtle CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,var(--scanline-opacity)) 2px,
      rgba(0,0,0,var(--scanline-opacity)) 4px
    );
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

  /* Selection */
  ::selection { background: rgba(255,171,0,0.25); color: var(--text-primary); }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes glow-red {
    0%, 100% { box-shadow: 0 0 8px var(--status-failed-glow); }
    50% { box-shadow: 0 0 16px var(--status-failed-glow), 0 0 32px rgba(255,23,68,0.08); }
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(100%); }
  }

  .animate-fade { animation: fadeIn 0.2s ease-out both; }
  .animate-slide-right { animation: slideInRight 0.25s ease-out both; }
  .animate-slide-up { animation: slideInUp 0.2s ease-out both; }

  /* ---- Layout ---- */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 48px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-default);
    flex-shrink: 0;
    z-index: 100;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-brand {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .topbar-subtitle {
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.5px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .topbar-ws-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .ws-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--status-running);
    box-shadow: 0 0 6px var(--status-running);
  }
  .ws-dot.disconnected { background: var(--status-failed); box-shadow: 0 0 6px var(--status-failed); }

  /* Icon buttons */
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px; height: 32px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .icon-btn:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
    border-color: var(--border-default);
  }
  .icon-btn svg { width: 16px; height: 16px; }

  /* Action buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1px solid var(--border-default);
    border-radius: 4px;
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }
  .btn svg { width: 14px; height: 14px; }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--text-inverse);
    font-weight: 500;
  }
  .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-danger {
    border-color: var(--status-failed-border);
    color: var(--status-failed);
  }
  .btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn-sm svg { width: 12px; height: 12px; }

  .btn-ghost {
    border-color: transparent;
    background: transparent;
  }
  .btn-ghost:hover { background: var(--bg-hover); border-color: var(--border-default); }

  /* Main content */
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ---- Status Summary Cards ---- */
  .status-cards {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .status-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 140px;
  }
  .status-card:hover { border-color: var(--border-strong); background: var(--bg-elevated); }
  .status-card.active { border-color: var(--accent-border); background: var(--accent-bg); }
  .status-card-count {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .status-card-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-card.running .status-card-count { color: var(--status-running); }
  .status-card.idle .status-card-count { color: var(--status-idle); }
  .status-card.failed .status-card-count { color: var(--status-failed); }
  .status-card.disabled .status-card-count { color: var(--status-disabled); }
  .status-card.unloaded .status-card-count { color: var(--status-unloaded); }

  /* ---- Failed Jobs Alert Panel ---- */
  .failed-panel {
    background: var(--status-failed-bg);
    border: 1px solid var(--status-failed-border);
    border-radius: 6px;
    animation: glow-red 3s ease-in-out infinite;
    overflow: hidden;
  }
  .failed-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
  }
  .failed-panel-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 13px;
    color: var(--status-failed);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .failed-pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--status-failed);
    animation: pulse-red 1.5s ease-in-out infinite;
    box-shadow: 0 0 8px var(--status-failed);
  }
  .failed-panel-body { padding: 0 16px 12px; }
  .failed-job-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(255,23,68,0.04);
    border: 1px solid rgba(255,23,68,0.12);
    border-radius: 4px;
    margin-bottom: 6px;
    animation: fadeIn 0.2s ease-out both;
  }
  .failed-job-row:last-child { margin-bottom: 0; }
  .failed-job-info {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }
  .failed-job-label {
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .failed-job-exit {
    font-size: 11px;
    padding: 2px 6px;
    background: rgba(255,23,68,0.15);
    border: 1px solid rgba(255,23,68,0.25);
    border-radius: 3px;
    color: var(--status-failed);
    font-weight: 500;
    white-space: nowrap;
  }
  .failed-job-blame {
    font-size: 11px;
    color: var(--text-tertiary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }
  .failed-job-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }

  /* ---- Filter Bar ---- */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
  }
  .filter-search {
    padding: 6px 10px;
    background: var(--bg-base);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .filter-search:focus { border-color: var(--accent-border); }
  .filter-search::placeholder { color: var(--text-tertiary); }

  .filter-select {
    padding: 6px 10px;
    background: var(--bg-base);
    border: 1px solid var(--border-default);
    border-radius: 4px;
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }
  .filter-select:focus { border-color: var(--accent-border); }

  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--border-default);
    border-radius: 4px;
    background: var(--bg-base);
    color: var(--text-secondary);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-toggle:hover { border-color: var(--border-strong); color: var(--text-primary); }
  .filter-toggle.active { border-color: var(--accent-border); color: var(--accent); background: var(--accent-bg); }
  .filter-toggle svg { width: 14px; height: 14px; }

  .filter-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    border-radius: 3px;
    color: var(--accent);
    font-size: 11px;
    cursor: pointer;
  }
  .filter-chip:hover { background: rgba(255,171,0,0.15); }

  /* ---- Job Table ---- */
  .job-table-container {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    flex: 1;
  }
  .job-table {
    width: 100%;
    border-collapse: collapse;
  }
  .job-table thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-tertiary);
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-default);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .job-table thead th:hover { color: var(--text-secondary); }
  .job-table thead th.sorted { color: var(--accent); }
  .job-table thead th .sort-arrow {
    display: inline-block;
    margin-left: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .job-table thead th:hover .sort-arrow { opacity: 0.5; }
  .job-table thead th.sorted .sort-arrow { opacity: 1; }

  .job-table tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.1s;
    cursor: pointer;
  }
  .job-table tbody tr:hover { background: var(--bg-hover); }
  .job-table tbody tr.selected { background: var(--accent-bg); }
  .job-table tbody tr.status-failed { background: rgba(255,23,68,0.03); }
  .job-table tbody tr.status-failed:hover { background: rgba(255,23,68,0.06); }

  .job-table td {
    padding: 7px 12px;
    font-size: 12px;
    white-space: nowrap;
    vertical-align: middle;
  }

  /* Status dot */
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.running {
    background: var(--status-running);
    box-shadow: 0 0 6px var(--status-running);
  }
  .status-dot.idle { background: var(--status-idle); box-shadow: 0 0 4px rgba(68,138,255,0.4); }
  .status-dot.failed {
    background: var(--status-failed);
    box-shadow: 0 0 6px var(--status-failed);
    animation: pulse-red 2s ease-in-out infinite;
  }
  .status-dot.disabled { background: var(--status-disabled); }
  .status-dot.unloaded {
    background: transparent;
    border: 1.5px solid var(--status-unloaded);
  }

  .job-label-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .job-label-text {
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 400;
  }

  .domain-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .domain-badge.user-agent { color: var(--status-idle); border-color: var(--status-idle-border); background: var(--status-idle-bg); }
  .domain-badge.global-agent { color: var(--accent); border-color: var(--accent-border); background: var(--accent-bg); }
  .domain-badge.system-daemon { color: #e040fb; border-color: rgba(224,64,251,0.25); background: rgba(224,64,251,0.08); }
  .domain-badge.apple {
    color: #e8a030;
    border-color: rgba(232,160,48,0.45);
    background: rgba(232,160,48,0.12);
    font-weight: 600;
    position: relative;
    padding-left: 20px;
  }
  .domain-badge.apple .apple-badge-icon {
    position: absolute;
    left: 5px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 12px;
  }

  /* Apple job row distinction — STRONG visual separation */
  .job-table tbody tr.apple-row {
    background: rgba(232,160,48,0.05);
    border-left: 3px solid rgba(232,160,48,0.60);
  }
  .job-table tbody tr.apple-row:hover {
    background: rgba(232,160,48,0.10);
  }
  .job-table tbody tr.apple-row td:first-child {
    padding-left: 9px;
  }
  .job-table tbody tr.apple-row .job-label-text {
    color: #d0a050;
    font-style: italic;
  }
  .job-table tbody tr.apple-row .schedule-text,
  .job-table tbody tr.apple-row .pid-text {
    color: rgba(208,160,80,0.6);
  }
  .apple-row-icon {
    display: inline-flex;
    align-items: center;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .apple-row-icon svg {
    width: 14px;
    height: 14px;
  }

  .exit-code {
    font-weight: 500;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
  }
  .exit-code.zero { color: var(--status-running); }
  .exit-code.nonzero { color: var(--status-failed); background: rgba(255,23,68,0.10); }

  .pid-text { color: var(--text-secondary); font-size: 11px; }
  .schedule-text { color: var(--text-secondary); font-size: 11px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

  .row-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .job-table tbody tr:hover .row-actions { opacity: 1; }

  .row-action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border: none;
    border-radius: 3px;
    background: transparent;
    color: var(--text-tertiary);
    cursor: pointer;
    transition: all 0.1s;
  }
  .row-action-btn:hover { background: var(--bg-active); color: var(--text-primary); }
  .row-action-btn.danger:hover { color: var(--status-failed); background: var(--danger-bg); }
  .row-action-btn svg { width: 13px; height: 13px; }

  /* Checkbox */
  .checkbox {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .checkbox:hover { border-color: var(--accent); }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: '';
    width: 4px; height: 7px;
    border: solid var(--text-inverse);
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  /* ---- Slide-out Detail Panel ---- */
  .panel-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .panel-overlay.visible { opacity: 1; }

  .detail-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 680px;
    max-width: 90vw;
    background: var(--bg-base);
    border-left: 1px solid var(--border-default);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
    box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  }
  .detail-panel.open { transform: translateX(0); }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-default);
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .panel-header-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-header-actions {
    display: flex;
    gap: 4px;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border-default);
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .panel-tab {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-tertiary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .panel-tab:hover { color: var(--text-secondary); }

          <span className="toast-message">{t.message}</span>
          <button className="toast-close" onClick={() => removeToast(t.id)}>
            <Icon name="x" size={14} />
          </button>
        </div>
      ))}
    </div>
  );
}

// ---- Confirm Dialog ----
function ConfirmDialog({ title, message, onConfirm, onCancel, danger = false }) {
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-dialog" onClick={e => e.stopPropagation()}>
        <div className="confirm-title">{title}</div>
        <div className="confirm-message">{message}</div>
        <div className="confirm-actions">

// ---- Status Cards ----
function StatusCards({ jobs, activeFilter, setActiveFilter }) {
  const counts = useMemo(() => {
    const c = { running: 0, idle: 0, failed: 0, disabled: 0, unloaded: 0 };
    jobs.forEach(j => { c[getJobStatus(j)]++; });
    return c;
  }, [jobs]);

  return (
    <div className="status-cards">
      {['running', 'idle', 'failed', 'disabled', 'unloaded'].map(s => (
        <div
          key={s}
          className={`status-card ${s} ${activeFilter === s ? 'active' : ''}`}
          onClick={() => setActiveFilter(activeFilter === s ? null : s)}
        >
          <div className="status-card-count">{counts[s]}</div>
          <div className="status-card-label">{statusLabel(s)}</div>
        </div>
      ))}
    </div>
  );
}

// ---- Filter Bar ----
function FilterBar({ search, setSearch, domainFilter, setDomainFilter, showApple, setShowApple, activeFilter, setActiveFilter }) {
  const searchRef = useRef(null);
  const appleForced = domainFilter === 'apple';

  // Esc clears search when focused
  const handleSearchKeyDown = (e) => {
    if (e.key === 'Escape') {
      if (search) {
        e.preventDefault();
        e.stopPropagation();
        setSearch('');
      } else {
        searchRef.current?.blur();
      }
    }
  };

  return (
    <div className="filter-bar">
      <Icon name="search" size={14} />
      <div style={{ flex: 1, minWidth: 200, position: 'relative' }}>
        <input
          ref={searchRef}
          className="filter-search"
          style={{ width: '100%', paddingRight: search ? 60 : 10 }}
          placeholder="Search jobs by label...  (/ to focus, Esc to clear)"
          value={search}
          onChange={e => setSearch(e.target.value)}
          onKeyDown={handleSearchKeyDown}
        />
        {search && (
          <button
            onClick={() => { setSearch(''); searchRef.current?.focus(); }}
            style={{
              position: 'absolute', right: 6, top: '50%', transform: 'translateY(-50%)',
              background: 'var(--bg-hover)', border: '1px solid var(--border-strong)',
              borderRadius: 4, color: 'var(--text-primary)', cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 3,
              padding: '2px 8px', lineHeight: 1, zIndex: 2,
              fontSize: 11, fontFamily: 'var(--font-mono)',
            }}
            title="Clear search (Esc)"
          >
            <Icon name="x" size={11} /> clear
          </button>
        )}
      </div>
      <select className="filter-select" value={domainFilter} onChange={e => {
        const val = e.target.value;
        setDomainFilter(val);
        // If selecting Apple domain, auto-enable apple visibility
        if (val === 'apple') setShowApple(true);
      }}>
        <option value="all">All Domains</option>
        <option value="user-agent">User Agents</option>
        <option value="global-agent">Global Agents</option>
        <option value="system-daemon">System Daemons</option>
        {showApple && <option value="apple">Apple</option>}
      </select>
      <div
        className={`filter-toggle ${showApple ? 'active' : ''} ${appleForced ? 'forced' : ''}`}
        onClick={() => {
          if (appleForced) return; // Can't toggle off while filtering to Apple
          setShowApple(!showApple);
        }}
        style={appleForced ? { opacity: 0.5, cursor: 'not-allowed' } : {}}
        title={appleForced ? 'Cannot hide Apple jobs while filtering by Apple domain' : 'Toggle Apple system jobs'}
      >
        <Icon name="shield" size={14} />

      </div>
      {activeFilter && (
        <div className="filter-chip" onClick={() => setActiveFilter(null)}>
          {statusLabel(activeFilter)} <Icon name="x" size={10} />
        </div>
      )}

        <kbd className="kbd">?</kbd> shortcuts
      </span>
    </div>
  );
}

// ---- Job Table ----
// ---- Pagination ----
function Pagination({ currentPage, totalPages, onPageChange }) {
  const [editingPage, setEditingPage] = useState(false);
  const [pageInput, setPageInput] = useState('');

  if (totalPages <= 1) return null;

  const handleSubmit = (e) => {
    e.preventDefault();
    const p = parseInt(pageInput, 10);
    if (p >= 1 && p <= totalPages) onPageChange(p);
    setEditingPage(false);
    setPageInput('');
  };

  const PgBtn = ({ onClick, disabled, children, title }) => (
    <button
      onClick={onClick}
      disabled={disabled}
      title={title}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        minWidth: 32, height: 28, padding: '0 8px',
        background: disabled ? 'transparent' : 'var(--bg-surface)',
        border: `1px solid ${disabled ? 'var(--border-subtle)' : 'var(--border-default)'}`,
        borderRadius: 4,
        color: disabled ? 'var(--text-tertiary)' : 'var(--text-primary)',
        cursor: disabled ? 'default' : 'pointer',
        fontFamily: 'var(--font-mono)', fontSize: 12, fontWeight: 500,
        opacity: disabled ? 0.4 : 1,
        transition: 'all 0.15s',
      }}
      onMouseEnter={e => { if (!disabled) { e.target.style.background = 'var(--bg-hover)'; e.target.style.borderColor = 'var(--border-strong)'; }}}
      onMouseLeave={e => { if (!disabled) { e.target.style.background = 'var(--bg-surface)'; e.target.style.borderColor = 'var(--border-default)'; }}}
    >
      {children}
    </button>
  );

  return (
    <div style={{
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
      fontSize: 12,
    }}>
      <PgBtn onClick={() => onPageChange(1)} disabled={currentPage === 1} title="First page">
        &laquo; First
      </PgBtn>
      <PgBtn onClick={() => onPageChange(currentPage - 1)} disabled={currentPage === 1} title="Previous page">
        &lsaquo; Prev
      </PgBtn>

      {editingPage ? (
        <form onSubmit={handleSubmit} style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}>
          <input
            autoFocus
            className="form-input"
            style={{ width: 48, height: 28, padding: '2px 6px', textAlign: 'center', fontSize: 12 }}
            value={pageInput}
            onChange={e => setPageInput(e.target.value)}
            onBlur={() => { setEditingPage(false); setPageInput(''); }}
            placeholder={String(currentPage)}
          />
          <span style={{ color: 'var(--text-tertiary)' }}>/ {totalPages}</span>
        </form>
      ) : (
        <span
          style={{
            padding: '4px 12px', cursor: 'pointer', color: 'var(--text-secondary)',
            userSelect: 'none', border: '1px solid var(--border-default)',
            borderRadius: 4, background: 'var(--bg-surface)',
          }}
          onClick={() => { setEditingPage(true); setPageInput(String(currentPage)); }}
          title="Click to jump to page"
        >
          Page <span style={{ color: 'var(--accent)', fontWeight: 700 }}>{currentPage}</span> of {totalPages}
        </span>
      )}

      <PgBtn onClick={() => onPageChange(currentPage + 1)} disabled={currentPage === totalPages} title="Next page">
        Next &rsaquo;
      </PgBtn>
      <PgBtn onClick={() => onPageChange(totalPages)} disabled={currentPage === totalPages} title="Last page">
        Last &raquo;
      </PgBtn>
    </div>
  );
}

// ---- Job Table ----
const PAGE_SIZE = 25;

function JobTable({ jobs, selected, setSelected, onRowClick, showApple }) {
  const [sortCol, setSortCol] = useState('status');
  const [sortAsc, setSortAsc] = useState(true);
  const [currentPage, setCurrentPage] = useState(1);

  const handleSort = (col) => {
    if (sortCol === col) setSortAsc(!sortAsc);
    else { setSortCol(col); setSortAsc(true); }
  };

  const toggleSelect = (label, e) => {
    e.stopPropagation();
    setSelected(prev =>
      prev.includes(label) ? prev.filter(l => l !== label) : [...prev, label]
    );
  };

  const toggleAll = () => {
    if (selected.length === jobs.length) setSelected([]);
    else setSelected(jobs.map(j => j.label));
  };

  // Reset to page 1 when filters/jobs change
  useEffect(() => { setCurrentPage(1); }, [jobs.length]);

  const sorted = useMemo(() => {
    const order = { failed: 0, running: 1, idle: 2, disabled: 3, unloaded: 4 };
    return [...jobs].sort((a, b) => {
      let cmp = 0;
      if (sortCol === 'status') cmp = order[getJobStatus(a)] - order[getJobStatus(b)];
      else if (sortCol === 'label') cmp = a.label.localeCompare(b.label);
      else if (sortCol === 'domain') cmp = a.domain.localeCompare(b.domain);
      else if (sortCol === 'exit') cmp = (a.lastExit || 0) - (b.lastExit || 0);
      return sortAsc ? cmp : -cmp;
    });
  }, [jobs, sortCol, sortAsc]);

  const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  const page = Math.min(currentPage, totalPages);
  const paginatedJobs = sorted.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  const SortHeader = ({ col, children, style }) => (
    <th
      className={sortCol === col ? 'sorted' : ''}
      onClick={() => handleSort(col)}
      style={style}
    >
      {children}
      <span className="sort-arrow">{sortCol === col ? (sortAsc ? '▲' : '▼') : '▲'}</span>
    </th>
  );

  return (
    <div className="job-table-container" style={{ overflow: 'auto' }}>
      <table className="job-table">
        <thead>
          <tr>
            <th style={{ width: 36 }}>
              <div
                className={`checkbox ${selected.length === jobs.length && jobs.length > 0 ? 'checked' : ''}`}
                onClick={toggleAll}
              />
            </th>
            <SortHeader col="status" style={{ width: 60 }}>Status</SortHeader>
            <SortHeader col="label">Label</SortHeader>
            <SortHeader col="domain" style={{ width: 120 }}>Domain</SortHeader>
            <th style={{ width: 180 }}>Schedule</th>
            <th style={{ width: 70 }}>PID</th>
            <SortHeader col="exit" style={{ width: 80 }}>Last Exit</SortHeader>
            <th style={{ width: 180, textAlign: 'right' }}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {paginatedJobs.map((job, i) => {
            const status = getJobStatus(job);
            return (
              <tr
                key={job.label}
                className={`${selected.includes(job.label) ? 'selected' : ''} status-${status} ${job.domain.startsWith('apple') ? 'apple-row' : ''}`}
                onClick={() => onRowClick(job)}
                style={{ animationDelay: `${i * 20}ms` }}
              >
                <td>
                  <div
                    className={`checkbox ${selected.includes(job.label) ? 'checked' : ''}`}
                    onClick={e => toggleSelect(job.label, e)}
                  />
                </td>
                <td>
                  <div className={`status-dot ${status}`} title={statusLabel(status)} />
                </td>
                <td>
                  <div className="job-label-cell">
                    {job.domain.startsWith('apple') && <span className="apple-row-icon" title="Apple system job"><AppleLogo size={14} color="#d0a050" /></span>}
                    <span className="job-label-text">{job.label}</span>
                  </div>
                </td>
                <td>
                  <span className={`domain-badge ${job.domain.startsWith('apple') ? 'apple' : job.domain}`}>
                    {job.domain.startsWith('apple') && <AppleLogo size={10} color="#e8a030" className="apple-badge-icon" />}
                    {job.domain.replace('-', ' ')}
                  </span>
                </td>
                <td><span className="schedule-text" title={job.schedule}>{job.scheduleHuman}</span></td>
                <td><span className="pid-text">{job.pid || '—'}</span></td>
                <td>
                  {job.lastExit !== null ? (
                    <span className={`exit-code ${job.lastExit === 0 ? 'zero' : 'nonzero'}`}>
                      {job.lastExit}
                    </span>
                  ) : '—'}
                </td>
                <td style={{ textAlign: 'right' }}>
                  <div className="row-actions">
                    <button className="row-action-btn" title="Start (s)" onClick={e => e.stopPropagation()}>
                      <Icon name="play" size={13} />
                    </button>
                    <button className="row-action-btn" title="Stop (x)" onClick={e => e.stopPropagation()}>
                      <Icon name="square" size={13} />
                    </button>
                    <button className="row-action-btn" title="Run Now (one-shot)" onClick={e => e.stopPropagation()}>
                      <Icon name="zap" size={13} />
                    </button>
                    <button className="row-action-btn" title="Reload (r)" onClick={e => e.stopPropagation()}>
                      <Icon name="refresh-cw" size={13} />
                    </button>
                    <button className="row-action-btn" title="Edit (e)" onClick={e => e.stopPropagation()}>
                      <Icon name="pencil" size={13} />
                    </button>
                    <button className="row-action-btn" title="Logs (l)" onClick={e => e.stopPropagation()}>
                      <Icon name="file-text" size={13} />
                    </button>
                    <button className="row-action-btn" title="Export" onClick={e => e.stopPropagation()}>
                      <Icon name="download" size={13} />
                    </button>
                    <button className="row-action-btn danger" title="Delete" onClick={e => e.stopPropagation()}>
                      <Icon name="trash-2" size={13} />
                    </button>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '6px 12px', borderTop: '1px solid var(--border-subtle)',
        background: 'var(--bg-elevated)', fontSize: 11, color: 'var(--text-tertiary)',
      }}>
        <span>{sorted.length} job{sorted.length !== 1 ? 's' : ''}{sorted.length !== jobs.length ? ` (filtered from ${jobs.length})` : ''}</span>
        <Pagination currentPage={page} totalPages={totalPages} onPageChange={setCurrentPage} />
        <span>{PAGE_SIZE} per page</span>
      </div>
    </div>
  );
}

                      <span className="timestamp">{line.time} </span>
                      <span className={line.level === 'error' ? 'error' : line.level === 'warn' ? 'warn' : ''}>
                        {line.text}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ---- Main App ----
function App() {
  const [jobs] = useState(ALL_MOCK_JOBS);
  const [search, setSearch] = useState('');
  const [domainFilter, setDomainFilter] = useState('all');
  const [statusFilter, setStatusFilter] = useState(null);
  const [showApple, setShowApple] = useState(false);
  const [selected, setSelected] = useState([]);
  const [detailJob, setDetailJob] = useState(null);
  const [detailInitialTab, setDetailInitialTab] = useState('info');
  const [showCreate, setShowCreate] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showConfirm, setShowConfirm] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [settings, setSettings] = useState({
    pollInterval: 5,
    showApple: false,
    darkMode: true,
    confirmDestructive: true,
    confirmApple: true,
  });

  const toastId = useRef(0);

  const addToast = useCallback((type, message) => {
    const id = ++toastId.current;
    setToasts(prev => [...prev, { id, type, message }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  // Apply theme
  useEffect(() => {
    if (settings.darkMode) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  }, [settings.darkMode]);

  // Filter jobs
  const filteredJobs = useMemo(() => {
    return jobs.filter(j => {
      if (!showApple && (j.domain === 'apple-agent' || j.domain === 'apple-daemon')) return false;
      if (domainFilter !== 'all') {
        if (domainFilter === 'apple') {
          if (!j.domain.startsWith('apple')) return false;
        } else if (j.domain !== domainFilter) return false;
      }
      if (statusFilter && getJobStatus(j) !== statusFilter) return false;
      if (search && !j.label.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [jobs, search, domainFilter, statusFilter, showApple]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      // Allow Esc from input fields to clear/blur
      if (e.key === 'Escape') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
          // Let the FilterBar's own Esc handler run first for search
          return;
        }
        setDetailJob(null); setShowCreate(false); setShowSettings(false);
        return;
      }
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === 'n') { e.preventDefault(); setShowCreate(true); }
      if (e.key === '/') { e.preventDefault(); document.querySelector('.filter-search')?.focus(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <div className="app-shell">
      {/* Top Bar */}
      <div className="topbar">
        <div className="topbar-left">
          <span className="topbar-brand">launchmaster</span>
          <span className="topbar-subtitle">launchd control center</span>
        </div>
        <div className="topbar-right">
          <div className="topbar-ws-status">
            <div className="ws-dot" />
            <span>Live</span>
          </div>
          <button className="btn btn-sm" onClick={() => addToast('success', 'Select a .plist file to import...')}>
            <Icon name="upload" size={13} /> Import
          </button>
          <button className="btn btn-sm btn-accent" onClick={() => setShowCreate(true)}>
            <Icon name="plus" size={13} /> New Job
          </button>
          <button className="icon-btn" onClick={() => addToast('success', 'Status refreshed')}>
            <Icon name="refresh-cw" size={16} />
          </button>
          <button className="icon-btn" onClick={() => setShowSettings(true)}>
            <Icon name="settings" size={16} />
          </button>
        </div>
      </div>

      {/* Main Content */}
      <div className="main-content">
        <StatusCards jobs={filteredJobs} activeFilter={statusFilter} setActiveFilter={setStatusFilter} />

        <FailedPanel
          jobs={filteredJobs}
          onOpenDetail={(j) => { setDetailInitialTab('info'); setDetailJob(j); }}
          onOpenLogs={(j) => { setDetailInitialTab('logs'); setDetailJob(j); }}
          onOpenEdit={(j) => { setDetailInitialTab('edit'); setDetailJob(j); }}
          onReload={(j) => addToast('success', `Reloading ${j.label}...`)}
        />

        <FilterBar
          search={search} setSearch={setSearch}
          domainFilter={domainFilter} setDomainFilter={setDomainFilter}
          showApple={showApple} setShowApple={setShowApple}
          activeFilter={statusFilter} setActiveFilter={setStatusFilter}
        />

        <BulkBar count={selected.length} onClear={() => setSelected([])} />

        <JobTable
          jobs={filteredJobs}
          selected={selected}
          setSelected={setSelected}
          onRowClick={(j) => { setDetailInitialTab('info'); setDetailJob(j); }}
          showApple={showApple}
        />
      </div>

      {/* Detail Panel */}
      {detailJob && (
        <DetailPanel
          job={detailJob}
          initialTab={detailInitialTab}
          onClose={() => setDetailJob(null)}
          addToast={addToast}
        />
      )}

      {/* Create Modal */}
      {showCreate && (
        <CreateJobModal onClose={() => setShowCreate(false)} addToast={addToast} />
      )}

      {/* Settings Modal */}
      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          settings={settings}
          setSettings={setSettings}
        />
      )}

      {/* Confirm Dialog (demo) */}
      {showConfirm && (
        <ConfirmDialog
          title={showConfirm.title}
          message={showConfirm.message}
          danger={showConfirm.danger}
          onConfirm={() => { showConfirm.onConfirm(); setShowConfirm(null); }}
          onCancel={() => setShowConfirm(null)}
        />
      )}

      {/* Toasts */}
      <ToastContainer toasts={toasts} removeToast={removeToast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
