name: codex
description: Built-in runner pack for OpenAI Codex CLI driven software delivery.
version: 1.0.0

phases:
  planning:
    enabled: true
    executor: agent
    model: opus
    prompt: prompts/planner.md
    max_instances: 3
  resolution:
    enabled: true
    executor: agent
    model: opus
    prompt: prompts/resolver.md
  execution:
    enabled: true
    executor: shell
    command: scripts/execute
    max_workers: 3
  verification:
    enabled: true
    command: "\"$COGNITIVE_SWITCHYARD_PACK_ROOT/scripts/verify\""

auto_fix:
  enabled: true
  max_attempts: 2
  model: opus
  prompt: prompts/fixer.md

isolation:
  type: git-worktree
  setup: scripts/isolate_start
  teardown: scripts/isolate_end

prerequisites:
  - name: Codex CLI available
    check: command -v codex >/dev/null 2>&1
  - name: Git available
    check: command -v git >/dev/null 2>&1

timeouts:
  task_idle: 300
  task_max: 0
  session_max: 14400

status:
  progress_format: "##PROGRESS##"
  sidecar_format: key-value
