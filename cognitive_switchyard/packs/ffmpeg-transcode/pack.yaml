name: ffmpeg-transcode
description: Batch video/audio transcoding with ffmpeg
version: "0.1.0"

phases:
  planning:
    enabled: false
  resolution:
    enabled: false
    executor: passthrough
  execution:
    executor: shell
    command: scripts/execute
    max_workers: 2
  verification:
    enabled: false

auto_fix:
  enabled: false

isolation:
  type: temp-directory

prerequisites:
  - name: ffmpeg
    check: "which ffmpeg"

timeouts:
  task_idle: 300
  task_max: 0
  session_max: 14400
