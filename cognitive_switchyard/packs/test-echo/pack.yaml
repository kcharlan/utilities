name: test-echo
description: Minimal test pack -- executes echo commands (no LLM required)
version: "0.1.0"

phases:
  planning:
    enabled: false
  resolution:
    enabled: false
    executor: passthrough
  execution:
    executor: shell
    command: scripts/execute
    max_workers: 2
  verification:
    enabled: false

auto_fix:
  enabled: false

isolation:
  type: none

prerequisites: []

timeouts:
  task_idle: 30
  task_max: 60
  session_max: 300
