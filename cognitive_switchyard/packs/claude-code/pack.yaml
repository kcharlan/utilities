name: claude-code
description: Coding workflow using Claude Code CLI with git worktree isolation
version: "0.1.0"

phases:
  planning:
    enabled: true
    executor: agent
    model: opus
    prompt: prompts/planner.md
    max_instances: 3
  resolution:
    enabled: true
    executor: agent
    model: opus
    prompt: prompts/resolver.md
  execution:
    executor: agent
    model: sonnet
    prompt: prompts/worker.md
    max_workers: 4
  verification:
    enabled: true
    command: scripts/verify
    interval: 4

auto_fix:
  enabled: true
  max_attempts: 2
  model: opus
  prompt: prompts/fixer.md

isolation:
  type: git-worktree
  setup: scripts/isolate_start
  teardown: scripts/isolate_end

prerequisites:
  - name: Claude CLI
    check: "which claude"
  - name: Git
    check: "which git"

timeouts:
  task_idle: 300
  task_max: 0
  session_max: 14400
